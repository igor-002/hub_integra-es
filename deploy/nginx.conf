# Hub Integrações — proxy do subpath /integracoes para o app Next (PM2 :3002)
# Cole este bloco DENTRO do `server { ... }` já existente no servidor.
#
# O Next.js já serve sob basePath /integracoes (next.config.ts), portanto
# NÃO reescreva/remova o prefixo — apenas faça proxy direto para a porta 3002.

location /integracoes {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# Integrações externas reportam execuções em:
#   POST https://SEU_DOMINIO/integracoes/api/report
#   body JSON: { "integracao_id": 1, "status": "sucesso", "registros_processados": 42, "disparado_por": "cron" }
